<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      background: #0a1628;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      line-height: 1.5;
    }
    .header {
      padding: 16px;
      border-bottom: 1px solid #1e3a6e;
    }
    .header h1 {
      font-size: 15px;
      font-weight: 700;
      color: #4f8ef7;
    }
    .header p {
      font-size: 11px;
      color: #64748b;
      margin-top: 2px;
    }
    .content { padding: 16px; }
    .status {
      padding: 12px;
      border-radius: 8px;
      text-align: center;
      font-size: 12px;
    }
    .status.ok {
      background: rgba(52, 211, 153, 0.1);
      border: 1px solid rgba(52, 211, 153, 0.2);
      color: #34d399;
    }
    .status.warn {
      background: rgba(251, 191, 36, 0.1);
      border: 1px solid rgba(251, 191, 36, 0.2);
      color: #fbbf24;
    }
    .status.off {
      background: #132042;
      border: 1px solid #1e3a6e;
      color: #64748b;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 10px;
      margin-top: 12px;
      background: #4f8ef7;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn:hover { background: #3a6bc5; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .result-mini { margin-top: 12px; }
    .result-mini .score-line {
      display: flex;
      align-items: baseline;
      gap: 8px;
    }
    .result-mini .score-val {
      font-size: 28px;
      font-weight: 800;
    }
    .result-mini .verdict-text {
      font-size: 13px;
      font-weight: 600;
    }
    .result-mini .rec {
      margin-top: 8px;
      font-size: 12px;
      color: #94a3b8;
      padding: 8px;
      background: #132042;
      border-radius: 6px;
    }
    .instructions {
      margin-top: 12px;
      font-size: 11px;
      color: #475569;
      line-height: 1.6;
    }
    .instructions li { margin-bottom: 4px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>FB Profile Analyzer</h1>
    <p>9-signal authenticity scoring</p>
  </div>

  <div class="content">
    <div id="status" class="status off">Checking...</div>
    <button id="analyzeBtn" class="btn" disabled>Scan This Profile</button>

    <div id="result" class="result-mini" style="display:none"></div>

    <div class="instructions">
      <strong>How to use:</strong>
      <ol style="padding-left: 16px; margin-top: 4px;">
        <li>Navigate to any Facebook profile</li>
        <li>Click "Scan This Profile" or use the floating button</li>
        <li>View the verdict overlay on the page</li>
      </ol>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
